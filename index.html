<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청소년자치연구소 실무진 업무관리</title>
    <!-- 외부 라이브러리 CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Modules (CDN Import) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc, setDoc, getDoc, getDocs, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- Configuration ---
        // Vercel 배포 시 Firebase 설정값을 여기에 입력하세요.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 환경 변수가 주입된 경우 (Canvas 실행 환경) 처리
        const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
        const app = initializeApp(finalConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dalgeurak-tims-v6';

        // --- Icons Utility (Lucide React Wrapper) ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = icon.toSvg({ class: className });
                        iconRef.current.innerHTML = svg;
                    }
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Constants & Themes ---
        const STATIC_STAFF_THEMES = {
            "김대겸(팀장)": { accent: "#334155", bg: "#f8fafc", border: "#cbd5e1" },
            "admin": { accent: "#7e22ce", bg: "#faf5ff", border: "#d8b4fe" },
            "정이한": { accent: "#2563eb", bg: "#eff6ff", border: "#bfdbfe" },
            "김소현": { accent: "#e11d48", bg: "#fff1f2", border: "#fecdd3" },
            "김정훈": { accent: "#059669", bg: "#ecfdf5", border: "#a7f3d0" },
            "김현아": { accent: "#d97706", bg: "#fffbeb", border: "#fde68a" }
        };

        const KR_HOLIDAYS_MAP = {
            "2024-01-01": "신정", "2024-02-09": "설날", "2024-02-10": "설날", "2024-02-11": "설날", "2024-02-12": "대체공휴일", 
            "2024-03-01": "삼일절", "2024-04-10": "선거일", "2024-05-01": "근로자의 날", "2024-05-05": "어린이날", "2024-05-06": "대체공휴일", 
            "2024-05-15": "부처님오신날", "2024-06-06": "현충일", "2024-08-15": "광복절", "2024-09-16": "추석", "2024-09-17": "추석", 
            "2024-09-18": "추석", "2024-10-03": "개천절", "2024-10-09": "한글날", "2024-12-25": "성탄절",
            "2025-01-01": "신정", "2025-01-28": "설날", "2025-01-29": "설날", "2025-01-30": "설날", "2025-03-01": "삼일절", 
            "2025-05-01": "근로자의 날", "2025-05-05": "어린이날", "2025-05-06": "부처님오신날", "2025-06-06": "현충일", "2025-08-15": "광복절", 
            "2025-10-03": "개천절", "2025-10-05": "추석", "2025-10-06": "추석", "2025-10-07": "추석", "2025-10-08": "대체공휴일", "2025-10-09": "한글날", "2025-12-25": "성탄절"
        };

        const DEFAULT_CATEGORIES = {
            PROGRAM: { label: "프로그램(사업)", milestones: [{ name: "계획서(기안서)", offset: -15, type: 'pre' }, { name: "평가서(결과보고서)", offset: 5, type: 'post' }] },
            COMMITTEE: { label: "위원회", milestones: [{ name: "회의자료", offset: -15, type: 'pre' }, { name: "위원장 미팅", offset: -3, type: 'pre' }, { name: "회의록", offset: 1, type: 'post' }, { name: "추진일정", offset: 1, type: 'post' }] },
            INTERNAL: { label: "내부회의", milestones: [{ name: "회의자료", offset: -5, type: 'pre' }, { name: "회의록", offset: 1, type: 'post' }] },
            EXTERNAL: { label: "외부행사(장기사업)", milestones: [{ name: "계획서(기안서)", offset: -30, type: 'pre' }, { name: "평가서(결과보고서)", offset: 5, type: 'post' }] },
            REFLECTION: { label: "성찰글", milestones: [] },
            ETC: { label: "기타", milestones: [] }
        };

        const INITIAL_STAFF = ["김대겸(팀장)", "정이한", "김소현", "김정훈", "김현아"];

        // --- Utilities ---
        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const getDayName = (date) => ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
        const formatFullDate = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${d.getMonth() + 1}월 ${d.getDate()}일(${getDayName(d)})`;
        };
        const isWorkDay = (date) => {
            const dateStr = date.toISOString().split('T')[0];
            const day = date.getDay();
            if (day === 0 || day === 1) return false;
            if (KR_HOLIDAYS_MAP[dateStr]) return false;
            return true;
        };
        const adjustDate = (date, direction) => {
            let adjusted = new Date(date);
            while (!isWorkDay(adjusted)) {
                adjusted.setDate(adjusted.getDate() + (direction === 'pre' ? -1 : 1));
            }
            return adjusted.toISOString().split('T')[0];
        };
        const getProjectHslColor = (title) => {
            let hash = 0;
            for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 65%, 42%)`;
        };
        const getStaffTheme = (name) => {
            if (STATIC_STAFF_THEMES[name]) return STATIC_STAFF_THEMES[name];
            if (name === "관리자") return STATIC_STAFF_THEMES["admin"];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            const h = Math.abs(hash) % 360;
            return { accent: `hsl(${h}, 70%, 45%)`, bg: `hsl(${h}, 70%, 97%)`, border: `hsl(${h}, 70%, 85%)` };
        };

        // --- App Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [programs, setPrograms] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [staffList, setStaffList] = useState(INITIAL_STAFF);
            const [viewMode, setViewMode] = useState('list');
            const [isLoading, setIsLoading] = useState(true);
            const [filterStaff, setFilterStaff] = useState('전체');
            const [sortType, setSortType] = useState('baseDate');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [form, setForm] = useState({ title: '', staffName: '', categoryKey: 'PROGRAM', baseDate: '' });

            useEffect(() => {
                onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth);
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubCat = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'categories'), (snap) => {
                    if (snap.exists()) setCategories(snap.data().data);
                });
                const unsubStaff = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'staff'), (snap) => {
                    if (snap.exists()) setStaffList(snap.data().list);
                });
                const unsubProg = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'programs')), (snap) => {
                    setPrograms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsLoading(false);
                });
                return () => { unsubCat(); unsubStaff(); unsubProg(); };
            }, [user]);

            useEffect(() => {
                if (currentUser && currentUser.id !== 'admin') setForm(p => ({ ...p, staffName: currentUser.name }));
            }, [currentUser]);

            const sortedPrograms = useMemo(() => {
                let res = filterStaff === '전체' ? [...programs] : programs.filter(p => p.staffName === filterStaff);
                return res.sort((a, b) => sortType === 'baseDate' 
                    ? new Date(a.baseDate) - new Date(b.baseDate) 
                    : new Date(a.earliestDate) - new Date(b.earliestDate));
            }, [programs, filterStaff, sortType]);

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} staffList={staffList} db={db} appId={appId} />;

            return (
                <div className="min-h-screen bg-slate-50 pb-20 font-sans text-slate-900 selection:bg-blue-100">
                    <header className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm flex flex-col md:flex-row justify-between items-center gap-3">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl shadow-md text-white"><Icon name="CheckSquare" className="w-5 h-5" /></div>
                            <div>
                                <h1 className="font-bold text-lg leading-none uppercase">DALGEURAK TIMS</h1>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="text-[10px] text-slate-400 font-bold">청소년자치연구소</span>
                                    <div className="h-1 w-1 bg-slate-200 rounded-full"></div>
                                    <span className={`text-[10px] font-black ${currentUser.isAdmin ? 'text-purple-600' : 'text-blue-600'}`}>{currentUser.name} 접속 중</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="flex bg-slate-100 rounded-xl p-1 border border-slate-200">
                                <button onClick={() => setViewMode('list')} className={`px-6 py-1.5 rounded-lg text-xs font-bold transition-all ${viewMode === 'list' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>리스트</button>
                                <button onClick={() => setViewMode('calendar')} className={`px-6 py-1.5 rounded-lg text-xs font-bold transition-all ${viewMode === 'calendar' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400'}`}>캘린더</button>
                            </div>
                            {currentUser.isAdmin && <button onClick={() => setIsAdminOpen(true)} className="p-2 bg-slate-800 text-white rounded-xl hover:bg-slate-700 shadow-sm"><Icon name="Settings" className="w-4 h-4" /></button>}
                            <button onClick={() => setCurrentUser(null)} className="p-2 bg-slate-100 text-slate-400 rounded-xl hover:bg-red-50 hover:text-red-500 transition-all"><Icon name="LogOut" className="w-4 h-4" /></button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6">
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
                            <h2 className="text-lg font-bold mb-5 flex items-center gap-2"><Icon name="Plus" className="w-5 h-5 text-blue-600" /> 신규 일정 등록</h2>
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const cat = categories[form.categoryKey] || { milestones: [] };
                                const base = new Date(form.baseDate);
                                const milestoneList = cat.milestones.map(m => {
                                    const target = new Date(base);
                                    target.setDate(base.getDate() + m.offset);
                                    return { name: m.name, date: adjustDate(target, m.type), completed: false, rejected: false };
                                });
                                const earliestDate = new Date(Math.min(base, ...milestoneList.map(m => new Date(m.date)))).toISOString();
                                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'programs'), {
                                    ...form,
                                    staffName: currentUser.isAdmin ? (form.staffName || currentUser.name) : currentUser.name,
                                    milestoneList, earliestDate, baseCompleted: false, baseRejected: false,
                                    createdAt: new Date().toISOString(), creatorId: currentUser.id
                                });
                                setForm(p => ({ ...p, title: '', baseDate: '' }));
                            }} className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end text-xs font-bold">
                                <div className="md:col-span-2"><label className="block text-[9px] text-slate-400 mb-1 ml-1">구분</label><select className="w-full p-2.5 border rounded-xl bg-slate-50" value={form.categoryKey} onChange={e => setForm({...form, categoryKey: e.target.value})}>{Object.entries(categories).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
                                <div className="md:col-span-5"><label className="block text-[9px] text-slate-400 mb-1 ml-1">업무명</label><input className="w-full p-2.5 border rounded-xl bg-slate-50" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="사업명 입력" required /></div>
                                <div className="md:col-span-3"><label className="block text-[9px] text-slate-400 mb-1 ml-1">기준일</label><input type="date" className="w-full p-2.5 border rounded-xl bg-slate-50" value={form.baseDate} onChange={e => setForm({...form, baseDate: e.target.value})} required /></div>
                                {currentUser.isAdmin && <div className="md:col-span-2"><label className="block text-[9px] text-slate-400 mb-1 ml-1">담당자</label><select className="w-full p-2.5 border rounded-xl" value={form.staffName} onChange={e => setForm({...form, staffName: e.target.value})}>{staffList.map(s => <option key={s} value={s}>{s}</option>)}</select></div>}
                                <div className="md:col-span-12 mt-2"><button className="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-black shadow-md">일정 생성</button></div>
                            </form>
                        </section>

                        <div className="mb-6 flex flex-col md:flex-row justify-between gap-4">
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                {["전체", ...staffList].map(s => <button key={s} onClick={() => setFilterStaff(s)} className={`px-4 py-1.5 rounded-xl text-[11px] font-bold border transition-all whitespace-nowrap ${filterStaff === s ? 'bg-slate-900 text-white' : 'bg-white text-slate-500'}`}>{s}</button>)}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setSortType('baseDate')} className={`px-4 py-2 rounded-xl text-[11px] font-bold border flex items-center gap-2 ${sortType === 'baseDate' ? 'bg-blue-600 text-white' : 'bg-white text-slate-500'}`}><Icon name="SortAsc" /> 기준일순</button>
                                <button onClick={() => setSortType('earliest')} className={`px-4 py-2 rounded-xl text-[11px] font-bold border flex items-center gap-2 ${sortType === 'earliest' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500'}`}><Icon name="Clock" /> 마감임박순</button>
                            </div>
                        </div>

                        {viewMode === 'list' ? (
                            <div className="space-y-4">
                                {sortedPrograms.map(p => <TaskCard key={p.id} prog={p} currentUser={currentUser} categories={categories} sortType={sortType} onUpdateStatus={(id, up) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'programs', id), up)} onDelete={async (p) => {if(confirm('삭제?')){await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'programs', p.id));}}} />)}
                            </div>
                        ) : <CalendarView programs={sortedPrograms} categories={categories} />}
                    </main>

                    {isAdminOpen && <AdminSettingsModal categories={categories} staffList={staffList} db={db} appId={appId} onClose={() => setIsAdminOpen(false)} />}
                </div>
            );
        }

        // --- Subcomponents & Helpers ---
        function LoginScreen({ onLogin, staffList, db, appId }) {
            const [isJoin, setIsJoin] = useState(false);
            const [name, setName] = useState(staffList[0]);
            const [pw, setPw] = useState('');
            const [error, setError] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                if (pw === '0000' && !isJoin) {
                    onLogin({ name: '관리자', id: 'admin', isAdmin: true });
                    return;
                }
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', name);
                const snap = await getDoc(userRef);
                if (isJoin) {
                    if (snap.exists() && snap.data().password) return setError('이미 등록됨');
                    await setDoc(userRef, { name, password: pw, isAdmin: name.includes('팀장') }, { merge: true });
                    onLogin({ name, id: name, isAdmin: name.includes('팀장') });
                } else {
                    if (snap.exists() && snap.data().password === pw) onLogin({ name, id: name, isAdmin: snap.data().isAdmin });
                    else setError('비밀번호 불일치');
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-[200]">
                    <form onSubmit={handleAuth} className="bg-white w-full max-w-md rounded-[2.5rem] p-10 space-y-6 shadow-2xl">
                        <div className="text-center"><h2 className="text-2xl font-black">업무관리 시스템</h2><p className="text-slate-400 text-sm">{isJoin ? '비밀번호 설정' : '로그인'}</p></div>
                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" value={name} onChange={e => setName(e.target.value)}>{staffList.map(s => <option key={s} value={s}>{s}</option>)}</select>
                        <input type="password" placeholder="비밀번호" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" value={pw} onChange={e => setPw(e.target.value)} required />
                        {error && <p className="text-red-500 text-xs text-center">{error}</p>}
                        <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black">{isJoin ? '신규 등록' : '접속'}</button>
                        <button type="button" onClick={() => setIsJoin(!isJoin)} className="w-full text-center text-xs font-bold text-slate-400 underline">{isJoin ? '로그인하기' : '실무진 신규 비밀번호 설정'}</button>
                    </form>
                </div>
            );
        }

        function TaskCard({ prog, currentUser, categories, sortType, onUpdateStatus, onDelete }) {
            const theme = getStaffTheme(prog.staffName);
            const items = [{ name: '기준일(D-Day)', date: prog.baseDate, isBase: true, completed: prog.baseCompleted }, ...(prog.milestoneList || [])];
            const sortedItems = sortType === 'baseDate' ? [items[0], ...items.slice(1).sort((a,b)=>new Date(a.date)-new Date(b.date))] : [...items].sort((a,b)=>new Date(a.date)-new Date(b.date));
            const earliest = [...items].sort((a,b)=>new Date(a.date)-new Date(b.date))[0].date;
            const canEdit = currentUser.isAdmin || prog.creatorId === currentUser.id;

            return (
                <div style={{ borderColor: theme.border }} className="bg-white rounded-2xl border overflow-hidden shadow-sm">
                    <div style={{ backgroundColor: theme.bg }} className="px-5 py-3 border-b flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div style={{ backgroundColor: theme.accent }} className="text-white px-3 py-1 rounded-xl text-[10px] font-bold">{prog.staffName}</div>
                            <h4 className="font-bold text-slate-800">{prog.title}</h4>
                        </div>
                        {canEdit && <button onClick={() => onDelete(prog)} className="text-slate-300 hover:text-red-500"><Icon name="Trash2" /></button>}
                    </div>
                    <div className="p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                        {sortedItems.map((item, i) => {
                            const isHigh = sortType === 'earliest' ? item.date === earliest : item.isBase;
                            const overdue = item.date < getTodayStr() && !item.completed;
                            return (
                                <div key={i} style={isHigh && !item.completed ? { backgroundColor: theme.accent, color: 'white' } : {}} className={`p-3 rounded-xl border flex flex-col ${item.completed ? 'opacity-50' : overdue ? 'bg-rose-100 border-rose-300' : 'bg-slate-50'}`}>
                                    <div className="flex justify-between items-start mb-1 text-[9px] font-bold uppercase">
                                        <span className={isHigh && !item.completed ? 'text-white/70' : 'text-slate-400'}>{item.name}</span>
                                        {overdue && <Icon name="AlertTriangle" className="w-3 h-3 text-red-600 animate-pulse" />}
                                    </div>
                                    <div className={`text-lg font-black ${item.completed ? 'line-through' : ''}`}>{formatFullDate(item.date)}</div>
                                    <div className="mt-2 pt-2 border-t border-black/5 flex gap-2">
                                        <button disabled={!canEdit} onClick={() => {
                                            const up = { ...prog };
                                            if (item.isBase) up.baseCompleted = !item.completed;
                                            else up.milestoneList = prog.milestoneList.map(m => m.name === item.name ? {...m, completed: !m.completed} : m);
                                            onUpdateStatus(prog.id, up);
                                        }} className={`px-2 py-0.5 rounded text-[9px] font-bold ${item.completed ? 'bg-green-500 text-white' : 'bg-white border text-slate-400'}`}>{item.completed ? '완료' : '진행'}</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CalendarView({ programs }) {
            const [cur, setCur] = useState(new Date());
            const year = cur.getFullYear(), month = cur.getMonth();
            const days = [...Array(new Date(year, month, 1).getDay()).fill(null), ...Array.from({length: new Date(year, month + 1, 0).getDate()}, (_, i) => i + 1)];
            
            return (
                <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                        <button onClick={() => setCur(new Date(year, month - 1))}><Icon name="ChevronLeft" /></button>
                        <h2 className="font-bold">{year}년 {month + 1}월</h2>
                        <button onClick={() => setCur(new Date(year, month + 1))}><Icon name="ChevronRight" /></button>
                    </div>
                    <div className="grid grid-cols-7 text-[10px] font-bold text-center py-2 bg-slate-50 border-b">{['일','월','화','수','목','금','토'].map(d=><div key={d}>{d}</div>)}</div>
                    <div className="grid grid-cols-7">
                        {days.map((d, i) => {
                            const dateStr = d ? `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` : null;
                            const holiday = KR_HOLIDAYS_MAP[dateStr];
                            const isToday = dateStr === getTodayStr();
                            const events = [];
                            programs.forEach(p => {
                                if (p.baseDate === dateStr) events.push({ t: 'D-Day', s: p.staffName, c: getProjectHslColor(p.title), done: p.baseCompleted });
                                (p.milestoneList || []).forEach(m => {
                                    if (m.date === dateStr) events.push({ t: m.name.split('(')[0], s: p.staffName, c: getProjectHslColor(p.title), done: m.completed });
                                });
                            });
                            return (
                                <div key={i} className={`border-r border-b p-1 min-h-[100px] overflow-y-auto ${d ? (holiday || i%7===0 || i%7===1 ? 'bg-red-50/20' : 'bg-white') : 'bg-slate-50/20'} ${isToday ? 'ring-2 ring-red-500 ring-inset z-10' : ''}`}>
                                    {d && (
                                        <>
                                            <div className="flex justify-between text-[10px] font-bold">
                                                <span className={i%7===0 || holiday ? 'text-red-600' : i%7===1 ? 'text-slate-400' : i%7===6 ? 'text-blue-500' : ''}>{d}</span>
                                                {holiday && <span className="text-[7px] text-red-400">{holiday}</span>}
                                            </div>
                                            <div className="space-y-0.5 mt-1">
                                                {events.map((ev, ei) => (
                                                    <div key={ei} style={{ backgroundColor: ev.done ? '#e2e8f0' : ev.c }} className={`text-[7px] p-0.5 rounded text-white truncate ${ev.done ? 'text-slate-400 line-through' : ''}`}>[{ev.t}] {ev.s}</div>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function AdminSettingsModal({ categories, staffList, db, appId, onClose }) {
            const [newS, setNewS] = useState('');
            const [pws, setPws] = useState({});
            useEffect(() => {
                getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users')).then(snap => {
                    const m = {}; snap.forEach(d => m[d.id] = d.data().password); setPws(m);
                });
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[300]">
                    <div className="bg-white w-full max-w-2xl rounded-[2rem] shadow-2xl flex flex-col max-h-[80vh] overflow-hidden">
                        <div className="p-6 border-b flex justify-between"><h3>관리자 설정</h3><button onClick={onClose}><Icon name="X" /></button></div>
                        <div className="p-6 overflow-y-auto space-y-6">
                            <div className="space-y-2">
                                <h4 className="text-sm font-bold">실무자 명단</h4>
                                <div className="flex gap-2"><input className="flex-1 p-2 border rounded-xl" value={newS} onChange={e=>setNewS(e.target.value)} /><button onClick={async () => { await setDoc(doc(db,'artifacts',appId,'public','data','settings','staff'), {list: [...staffList, newS]}); setNewS(''); }} className="bg-blue-600 text-white px-4 rounded-xl">추가</button></div>
                                {staffList.map(s => <div key={s} className="flex justify-between p-3 bg-slate-50 rounded-xl"><span>{s} (PW: {pws[s] || '미설정'})</span><button onClick={async() => { if(confirm('삭제?')) await setDoc(doc(db,'artifacts',appId,'public', 'data', 'settings', 'staff'), {list: staffList.filter(x=>x!==s)}); }} className="text-red-500"><Icon name="Trash" /></button></div>)}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
